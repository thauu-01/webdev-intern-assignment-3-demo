version: '3.8'

services:
  # ── CƠ SỞ DỮ LIỆU (MONGODB LOCAL) ──
  mongodb:
    image: mongo:latest
    container_name: g-scores-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  # ── BACKEND API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: g-scores-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/g_scores
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    volumes:
      - ./dataset:/dataset
    depends_on:
      - mongodb
    restart: always

  # ── FRONTEND WEB UI ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: g-scores-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
